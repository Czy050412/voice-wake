# Voice Wake Configuration
# Edit this file to customize your voice assistant

# --- Core Settings ---
wake_word: "鐙楄泲"
language: "zh"
model: "small"  # tiny/small/medium/large - bigger = better accuracy but slower

# --- WorkBuddy Integration ---
workbuddy:
  enabled: true  # Set false to disable auto-send to WorkBuddy
  input_offset_y: -180  # Pixel offset from window bottom to input box

# --- System Commands (voice_commands.py) ---
commands:
  enabled: true  # Enable voice-controlled system commands
  confirm_actions: false  # Ask for confirmation before destructive actions

# --- Text-to-Speech ---
tts:
  enabled: true
  voice: "default"  # Windows SAPI voice name
  rate: 0  # Speech rate (-10 to 10)

# --- Advanced ---
advanced:
  mic_index: null  # null = auto-detect, or specify microphone index
  energy_threshold: 600  # Higher = less sensitive. 600 blocks video/bg noise
  pause_threshold: 0.6  # Faster response: seconds of silence before ending phrase (was 1.5)
  phrase_limit: 10  # Max phrase length in seconds (was 15)
  send_cooldown: 3.0  # Minimum seconds between sends (was 5.0)
  log_level: "info"  # debug/info/warn/error
  dynamic_energy: false  # false = use fixed energy_threshold (was true, caused gradual sensitivity increase)
  silence_threshold: 300  # Lower = more aggressive silence detection
