# Voice Wake v3 — Custom Actions
# =================================
# Define your own actions. Each action has:
#   name:     Unique identifier
#   type:     "http" | "python" | "shell" | "keyboard"
#   priority: Lower = higher priority (1-99, 1=first to try)
#   trigger_keywords: Text must contain at least one keyword to trigger

